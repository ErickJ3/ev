name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2

      - name: Disable io_uring (workaround for Zig 0.16 hang)
        run: sudo sysctl -w kernel.io_uring_disabled=2 || true

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ZON_VERSION=$(grep '\.version' build.zig.zon | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$ZON_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) != build.zig.zon ($ZON_VERSION)"
            exit 1
          fi

      - run: zig build test
        timeout-minutes: 10

      - run: zig build release
        timeout-minutes: 10

      - name: Prepare assets
        run: |
          mkdir -p dist
          cp zig-out/release/x86_64-linux/ev dist/ev-linux-x86_64
          cp zig-out/release/aarch64-linux/ev dist/ev-linux-aarch64
          cp zig-out/release/x86_64-freebsd/ev dist/ev-freebsd-x86_64
          cd dist && sha256sum ev-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          files: |
            dist/ev-linux-x86_64
            dist/ev-linux-aarch64
            dist/ev-freebsd-x86_64
            dist/checksums.txt
