name: Test
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-test-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-cache-test-${{ runner.os }}-
      - run: zig build test
